# ============================================================
# Caliper — 동시 투표자 32명 테스트 (TPS 10 고정)
# ============================================================
test:
  name: 동시 투표자 32명 테스트
  workers:
    number: 32

  rounds:
    - label: Workers_32_TPS10
      txNumber: 320
      rateControl:
        type: fixed-rate
        opts: { tps: 10 }
      workload:
        module: workloads/castVote.js
        arguments: { electionID: ws-32, candidates: [A, B, C] }

observer:
  type: local
  interval: 5
