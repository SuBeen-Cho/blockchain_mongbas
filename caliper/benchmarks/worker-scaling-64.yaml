# ============================================================
# Caliper — 동시 투표자 64명 테스트 (TPS 10 고정)
# ============================================================
test:
  name: 동시 투표자 64명 테스트
  workers:
    number: 64

  rounds:
    - label: Workers_64_TPS10
      txNumber: 640
      rateControl:
        type: fixed-rate
        opts: { tps: 10 }
      workload:
        module: workloads/castVote.js
        arguments: { electionID: ws-64, candidates: [A, B, C] }

observer:
  type: local
  interval: 5
