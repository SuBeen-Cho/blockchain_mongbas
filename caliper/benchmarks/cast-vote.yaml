# ============================================================
# Caliper 벤치마크 설정 — CastVote (투표 제출)
#
# 측정 목표:
#   - TPS (초당 트랜잭션 처리량)
#   - Latency (P50 / P95 / P99)
#   - BatchTimeout 영향 분석
#   - 동시 투표자 수 증가에 따른 성능 변화
# ============================================================

test:
  name: BFT 익명 전자투표 — CastVote 성능 측정
  description: |
    Nullifier + PDC 기반 익명 투표 트랜잭션의 처리 성능 측정.
    동시 투표자 수(workers)와 전송 속도(tps)를 변화시켜 최적 운영 파라미터 탐색.

  workers:
    number: 4   # 동시 투표자 수 (선거관리위원회 2-of-3 정책으로 최소 2피어 참여)

  rounds:
    # ── Round 1: 낮은 부하 (기준선) ─────────────────────────
    - label: CastVote_Low
      description: "낮은 TPS (1 tps) — 기준 latency 측정"
      txNumber: 50
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workloads/castVote.js
        arguments:
          electionID: caliper-bench-low
          candidates: [A, B, C]

    # ── Round 2: 중간 부하 ──────────────────────────────────
    - label: CastVote_Mid
      description: "중간 TPS (5 tps) — BatchTimeout 영향 구간"
      txNumber: 100
      rateControl:
        type: fixed-rate
        opts:
          tps: 5
      workload:
        module: workloads/castVote.js
        arguments:
          electionID: caliper-bench-mid
          candidates: [A, B, C]

    # ── Round 3: 높은 부하 ──────────────────────────────────
    - label: CastVote_High
      description: "높은 TPS (10 tps) — 포화 구간 latency 측정"
      txNumber: 150
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workloads/castVote.js
        arguments:
          electionID: caliper-bench-high
          candidates: [A, B, C]

    # ── Round 4: Backlog 제어 ───────────────────────────────
    - label: CastVote_Backlog
      description: "백로그 제어 (목표 backlog=5) — 자동 TPS 조정"
      txNumber: 100
      rateControl:
        type: fixed-backlog
        opts:
          unfinished_per_client: 5
      workload:
        module: workloads/castVote.js
        arguments:
          electionID: caliper-bench-backlog
          candidates: [A, B, C]

monitor:
  type: [docker, process]
  docker:
    name: [peer0.ec.voting.example.com, peer0.party.voting.example.com,
           peer0.civil.voting.example.com, orderer1.orderer.voting.example.com]
    interval: 5
  process:
    - command: node
      arguments: src/app.js
      multiOutput: avg
    interval: 5

observer:
  type: local
  interval: 5
