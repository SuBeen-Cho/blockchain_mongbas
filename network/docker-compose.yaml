      - /Users/subeen/.docker/run/docker.sock:/host/var/run/docker.sock
      - ../fabric-samples/config/core.yaml:/etc/hyperledger/fabric/core.yaml
      - ./crypto-config/peerOrganizations/civil.voting.example.com/peers/peer0.civil.voting.example.com/msp:/etc/hyperledger/fabric/msp
      - ./crypto-config/peerOrganizations/civil.voting.example.com/peers/peer0.civil.voting.example.com/tls:/etc/hyperledger/fabric/tls
      - peer0.civil.voting.example.com:/var/hyperledger/production
    command: peer node start
    ports:
      - "9051:9051"
      - "19051:19051"
    networks:
      - voting-net

  ##############################################################################
  # CLI 툴 컨테이너 (채널 생성, 체인코드 배포 등 관리 작업용)
  # 기본값: 선거관리위원회 Admin 권한으로 실행
  ##############################################################################
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.ec.voting.example.com:7051
      - CORE_PEER_LOCALMSPID=ElectionCommissionMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/crypto/peerOrganizations/ec.voting.example.com/peers/peer0.ec.voting.example.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/crypto/peerOrganizations/ec.voting.example.com/peers/peer0.ec.voting.example.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/crypto/peerOrganizations/ec.voting.example.com/peers/peer0.ec.voting.example.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/crypto/peerOrganizations/ec.voting.example.com/users/Admin@ec.voting.example.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /Users/subeen/.docker/run/docker.sock:/host/var/run/docker.sock
      - ./crypto-config:/crypto
      - ./channel-artifacts:/channel-artifacts
      - ../chaincode:/opt/gopath/src/github.com/chaincode
    depends_on:
      - peer0.ec.voting.example.com
      - peer1.ec.voting.example.com
      - peer0.party.voting.example.com
      - peer0.civil.voting.example.com
    networks:
      - voting-net

  ##############################################################################
  # Chaincode as a Service — 투표 체인코드 서비스
  # macOS Docker Desktop에서 Docker-in-Docker 빌드 불가 문제 해결을 위한 CCAAS
  ##############################################################################
  voting-chaincode:
    container_name: voting-chaincode
    image: voting-chaincode:1.0
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:7052
      - CHAINCODE_ID=voting_1.0   # deploy 후 실제 패키지 ID로 교체 필요
    depends_on:
      - peer0.ec.voting.example.com
    networks:
      - voting-net
