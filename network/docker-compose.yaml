################################################################################
# docker-compose.yaml
# BFT 전자투표 네트워크 — 다중 조직 구성 (configtx.yaml, crypto-config.yaml과 일치)
#
#  이미지: Hyperledger Fabric 3.0 (SmartBFT 지원 최소 버전)
#
#  오더러  4개 : orderer1~4 (SmartBFT, 3f+1)
#  피어    4개 : EC(2) + Party(1) + Civil(1)
#  CouchDB 4개 : 피어별 1개
#  CLI     1개 : 관리 작업용
#
# 포트 요약
#   orderer1 7050 | orderer2 7150 | orderer3 7250 | orderer4 7350
#   peer0.ec 7051 | peer1.ec 7151 | peer0.party 8051 | peer0.civil 9051
#   couchdb-ec0 5984 | couchdb-ec1 5985 | couchdb-party 6984 | couchdb-civil 7984
################################################################################

version: '3.8'

networks:
  voting-net:
    name: voting-net

volumes:
  orderer1.orderer.voting.example.com:
  orderer2.orderer.voting.example.com:
  orderer3.orderer.voting.example.com:
  orderer4.orderer.voting.example.com:
  peer0.ec.voting.example.com:
  peer1.ec.voting.example.com:
  peer0.party.voting.example.com:
  peer0.civil.voting.example.com:
  couchdb-ec0:
  couchdb-ec1:
  couchdb-party:
  couchdb-civil:

services:

  ##############################################################################
  # 오더러 노드 1~4 (SmartBFT BFT 합의)
  ##############################################################################
  orderer1.orderer.voting.example.com:
    container_name: orderer1.orderer.voting.example.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=none
      - ORDERER_CHANNELPARTICIPATION_ENABLED=true
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_TLS_CLIENTROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_OPERATIONS_LISTENADDRESS=0.0.0.0:17050
    command: orderer
    volumes:
      - ./crypto-config/ordererOrganizations/orderer.voting.example.com/orderers/orderer1.orderer.voting.example.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config/ordererOrganizations/orderer.voting.example.com/orderers/orderer1.orderer.voting.example.com/tls:/var/hyperledger/orderer/tls
      - orderer1.orderer.voting.example.com:/var/hyperledger/production/orderer
    ports:
      - "7050:7050"
      - "7053:7053"
      - "17050:17050"
    networks:
      - voting-net

  orderer2.orderer.voting.example.com:
