      - CORE_PEER_ADDRESS=peer0.ec.voting.example.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.ec.voting.example.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.ec.voting.example.com:7151
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.ec.voting.example.com:7051
      - CORE_PEER_LOCALMSPID=ElectionCommissionMSP
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:17051
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb-ec0:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    depends_on:
      couchdb-ec0:
        condition: service_healthy
    volumes:
      - /Users/subeen/.docker/run/docker.sock:/host/var/run/docker.sock
      - ../fabric-samples/config/core.yaml:/etc/hyperledger/fabric/core.yaml
      - ./crypto-config/peerOrganizations/ec.voting.example.com/peers/peer0.ec.voting.example.com/msp:/etc/hyperledger/fabric/msp
