  ##############################################################################
  # CouchDB (조직·피어별 1개씩, 총 4개)
  ##############################################################################
  couchdb-ec0:
    container_name: couchdb-ec0
    image: couchdb:3.4.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    volumes:
      - couchdb-ec0:/opt/couchdb/data
    ports:
      - "5984:5984"   # peer0.ec
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5984/_up"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - voting-net

  couchdb-ec1:
    container_name: couchdb-ec1
    image: couchdb:3.4.2
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
